services:
  ontop:
    build:
      context: ontop
      dockerfile: ontop.dockerfile
    container_name: ontop-sdc
    ports:
      - "8080:8080"
    volumes:
      - ./ontop/mappings:/opt/ontop/input/mappings
      - ./db:/db
      - ./blanks:/blanks
    networks:
      - dwc-net
    command: [
      "ontop", "endpoint",
      "-m", "/opt/ontop/input/mappings/dwcowl.obda",
      "-p", "/opt/ontop/input/mappings/dwcowl.properties",
      "-t", "/opt/ontop/input/mappings/dwcowl.ttl"
    ]


  valkey:
    image: valkey/valkey:9.0.4
    container_name: valkey-sdc
    ports:
      - "6379:6379"
    networks:
      - dwc-net
    command: [
        "valkey-server",
        "--maxmemory",
        "1gb",
        "--maxmemory-policy",
        "allkeys-lfu"
      ]


  fastaproxy:
    build:
      context: fastaproxy
      dockerfile: fastaproxy.dockerfile
    container_name: fastaproxy-sdc
    volumes:
      - ./fastaproxy:/app
      - ./db:/db
      - ./blanks:/blanks
      - ./ontop/mappings:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - valkey
    ports:
      - "8000:8000"
    networks:
      - dwc-net
    environment:
      TIMEOUT_VAL: 100
      TTL_VAL: 90
      ONTOP_IMAGE: semantic-data-cloud-ontop
      ONTOP_NETWORK: dwc-net
    restart: unless-stopped


  biomcp:
    build:
      context: biomcp
      dockerfile: biomcp.dockerfile
    container_name: biomcp-sdc
    ports:
      - "9000:9000"
    networks:
      - dwc-net
    environment:
      TIMEOUT_VAL: 100


  metadata-api:
    build: 
      context: metadata-fast-api
      dockerfile: Dockerfile
    command: "uvicorn main:app --proxy-headers --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./data:/data
      - ./metadata-fast-api:/app
    restart: always
    ports:
      - "7788:8000"
    networks:
      - dwc-net
    environment:
      - S3_ACCESS_ID=${S3_ACCESS_ID}
      - S3_ACCESS_SECRET=${S3_ACCESS_SECRET}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - OBJECT_STORE_BASE_URL=${OBJECT_STORE_BASE_URL}
      - API_BASE_URL=${API_BASE_URL}


networks:
  dwc-net:
    external: true